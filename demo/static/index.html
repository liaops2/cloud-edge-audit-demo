<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local Agent vs Cloud-Edge Audit</title>
  <link rel="stylesheet" href="/static/style.css?v=20260709-1" />
</head>
<body>
  <div class="chat-app">
    <header class="chat-header">
      <div class="chat-header__title">
        <h1>Local Agent vs Cloud-Edge Audit</h1>
      </div>
      <div class="chat-header__meta">
        <div class="mode-switch" role="group" aria-label="Run mode">
          <button type="button" class="mode-btn" data-mode="local_direct" id="modeLocal">Local Agent</button>
          <button type="button" class="mode-btn" data-mode="cloud_edge" id="modeCloud">Cloud-Edge Audit</button>
        </div>
      </div>
    </header>

    <main class="chat-thread" id="chatThread" aria-live="polite"></main>

    <footer class="chat-compose">
      <section class="prompt-panel" id="promptPanel" aria-label="Task Prompt">
        <div class="prompt-panel__head">
          <span class="prompt-panel__title">Task Prompt</span>
          <div class="prompt-chips" id="promptChips"></div>
          <button type="button" class="prompt-use-btn" id="usePromptBtn">Fill input</button>
        </div>
        <pre class="prompt-official" id="officialPrompt"></pre>
      </section>
      <div class="chat-compose__inner">
        <textarea
          id="messageInput"
          class="chat-compose__input"
          rows="1"
          placeholder="Pick a task prompt above or type your own…"
          autocomplete="off"
        ></textarea>
        <button id="sendBtn" class="chat-send-btn" type="button" title="Send">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
      <p class="chat-compose__hint">Enter to send · Shift+Enter for newline</p>
    </footer>
  </div>
  <script src="/static/app.js?v=20260709-1"></script>
</body>
</html>
