<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>端云审计 Demo</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="chat-app">
    <header class="chat-header">
      <div class="chat-header__title">
        <h1>端云审计 Demo</h1>
        <p class="chat-header__sub">边侧 edge-worker · 对话式任务下发</p>
      </div>
      <div class="chat-header__meta">
        <div class="mode-switch" role="group" aria-label="运行模式">
          <button type="button" class="mode-btn" data-mode="local_direct" id="modeLocal">本地直连</button>
          <button type="button" class="mode-btn" data-mode="cloud_edge" id="modeCloud">端云规划+审计</button>
        </div>
      </div>
    </header>

    <main class="chat-thread" id="chatThread" aria-live="polite"></main>

    <footer class="chat-compose">
      <section class="prompt-panel" id="promptPanel" aria-label="PinchBench 官方 Prompt">
        <div class="prompt-panel__head">
          <span class="prompt-panel__title">PinchBench 官方 Prompt</span>
          <div class="prompt-chips" id="promptChips"></div>
          <button type="button" class="prompt-use-btn" id="usePromptBtn">填入输入框</button>
        </div>
        <pre class="prompt-official" id="officialPrompt">加载中…</pre>
      </section>
      <div class="chat-compose__inner">
        <textarea
          id="messageInput"
          class="chat-compose__input"
          rows="1"
          placeholder="选择上方官方 Prompt 或自行输入任务…"
          autocomplete="off"
        ></textarea>
        <button id="sendBtn" class="chat-send-btn" type="button" title="发送">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
      <p class="chat-compose__hint">Enter 发送 · Shift+Enter 换行 · 运行中点击红色按钮终止</p>
    </footer>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
